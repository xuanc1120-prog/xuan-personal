name: Generate Snake Animation

on:
  schedule:
    # 每天跑一次
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

# 必须增加写入权限，否则会报 git push 128 错误
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          # 你的 GitHub 用户名
          github_user_name: xuanc1120-prog
          # 生成的 SVG 存放在 output 目录下
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-sakura.svg?color_snake=#E2849F&color_dots=#ebedf0,#ffc4d0,#ffa6b7,#E2849F,#B5EAD7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

